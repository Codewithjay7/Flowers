<!DOCTYPE html>
<html>
<head>
<title>For Dhaval 😂</title>

<style>

body{
  background: linear-gradient(135deg,#ffd6e0,#ff9aa2);
  text-align:center;
  font-family:Arial;
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  cursor:pointer;
  position:relative;
}

#openBtn{
  margin-top:200px;
  font-size:18px;
}

.card{
  margin-top:100px;
  padding:30px;
  background:white;
  border-radius:20px;
  width:340px;
  margin-left:auto;
  margin-right:auto;
  box-shadow:0px 10px 20px rgba(0,0,0,0.2);
  display:none;
}

</style>

<script>

function openCard(){
  document.getElementById("card").style.display="block";
  document.getElementById("openBtn").style.display="none";
}

function moveButton(){
  var btn = document.getElementById("noBtn");

  var x = Math.floor(Math.random()*300) - 150;
  var y = Math.floor(Math.random()*200) - 100;

  btn.style.transform = "translate("+x+"px,"+y+"px)";
}

function yesWoman(){
  document.getElementById("result").innerHTML =
  "😂 I knew it! Happy Women's Day Dhaval 🌸<br>Thanks for accepting the truth 😎";
}

</script>

</head>

<body>

<button id="openBtn" onclick="openCard()">
🌸 Tap This Dhaval
</button>

<div class="card" id="card">

<h2>Happy Women's Day Dhaval 😂</h2>

<p>
I know you are not a woman… but still you deserve a Women's Day wish 😆
</p>

<img src="https://cdn.pixabay.com/photo/2016/11/29/04/17/rose-1867752_1280.jpg" width="160">

<p><b>Question:</b></p>

<p>Are you a woman? 🤔</p>

<button id="noBtn" onmouseover="moveButton()">
I am NOT a woman 😎
</button>

<button onclick="yesWoman()">
Okay I am a woman 😂
</button>

<p id="result"></p>

</div>

</body>
</html>
