<!DOCTYPE html>
<html>
<head>
<title>For Aateka 🌸</title>

<style>

body{
  background: linear-gradient(135deg,#ffd6e0,#ff9aa2);
  text-align:center;
  font-family:Arial;
}

.card{
  margin-top:100px;
  padding:30px;
  background:white;
  border-radius:20px;
  width:340px;
  margin-left:auto;
  margin-right:auto;
  box-shadow:0px 10px 20px rgba(0,0,0,0.2);
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  cursor:pointer;
  position:relative;
}

</style>

<script>

function moveButton(){
  var btn = document.getElementById("angryBtn");

  var x = Math.floor(Math.random()*200) - 100;
  var y = Math.floor(Math.random()*200) - 100;

  btn.style.transform = "translate("+x+"px,"+y+"px)";
}

function forgive(){
  document.getElementById("result").innerHTML =
  "😌 Thank you Aateka ❤️<br>I promise next Women's Day I will wish you first 🌹";
}

</script>

</head>

<body>

<div class="card">

<h2>Happy Women's Day Aateka 🌷</h2>

<p>
Okay I admit... I forgot to wish you 😭  
So this is my small apology flower for you 🌹
</p>

<p><b>Are you still angry?</b></p>

<button id="angryBtn" onmouseover="moveButton()">
Yes I'm Angry 😡
</button>

<button onclick="forgive()">
No I'm Not Angry 🙂
</button>

<p id="result"></p>

</div>

</body>
</html>
