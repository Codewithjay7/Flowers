<!DOCTYPE html>
<html>
<head>
<title>For Aateka 🌸</title>

<style>

body{
  background: linear-gradient(135deg,#ffd6e0,#ff9aa2);
  text-align:center;
  font-family:Arial;
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  cursor:pointer;
  position:relative;
}

#openBtn{
  margin-top:200px;
  font-size:18px;
}

.card{
  margin-top:100px;
  padding:30px;
  background:white;
  border-radius:20px;
  width:340px;
  margin-left:auto;
  margin-right:auto;
  box-shadow:0px 10px 20px rgba(0,0,0,0.2);
  display:none;
}

img{
  margin-top:10px;
  border-radius:10px;
}

</style>

<script>

function openFlower(){
  document.getElementById("card").style.display="block";
  document.getElementById("openBtn").style.display="none";
}

function moveButton(){
  var btn = document.getElementById("angryBtn");

  var x = Math.floor(Math.random()*200) - 100;
  var y = Math.floor(Math.random()*200) - 100;

  btn.style.transform = "translate("+x+"px,"+y+"px)";
}

function forgive(){
  document.getElementById("result").innerHTML =
  "😌 Thank you Aateka ❤️<br>I promise next Women's Day I will wish you first 🌹";
}

</script>

</head>

<body>

<button id="openBtn" onclick="openFlower()">
🌹 Tap My Flower Aateka
</button>

<div class="card" id="card">

<h2>Happy Women's Day Aateka 🌷</h2>

<p>
Okay… before you get more angry 😅  
I need to confess something...
</p>

<p>
I forgot to wish you on Women's Day 😭  
And I know you might be angry.
</p>

<p>
So I brought this small flower for you 🌹
</p>

<img src="https://cdn.pixabay.com/photo/2016/11/29/04/17/rose-1867752_1280.jpg" width="160">

<p><b>Are you still angry?</b></p>

<button id="angryBtn" onmouseover="moveButton()">
Yes I'm Angry 😡
</button>

<button onclick="forgive()">
Okay I Forgive You 🙂
</button>

<p id="result"></p>

</div>

</body>
</html>
